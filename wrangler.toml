name = "stock-api"
main = "worker/stock-api.js"
compatibility_date = "2024-01-01"

# 免費方案設定
workers_dev = true

# D1 Database for stock notes
# 1. Create D1: npx wrangler d1 create stock-notes
# 2. Update the database_id below
# 3. Run migration: npx wrangler d1 execute stock-notes --file=./migrations/001_create_notes.sql
# [[d1_databases]]
# binding = "DB"
# database_name = "stock-notes"
# database_id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

# Environment variables (set in Cloudflare Dashboard):
# - FUGLE_API_KEY: Fugle API key
# - ADMIN_KEY: Admin password for managing notes
