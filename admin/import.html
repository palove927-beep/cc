        function renderNotes() {
            var container = document.getElementById("notesList");
            var html = "";

            for (var i = 0; i < notesData.length; i++) {
                var note = notesData[i];
                html += '<div class="note-item" id="note-' + note.code + '">';
                html += '<div class="checkbox-row">';
                html += '<input type="checkbox" id="check-' + note.code + '" checked>';
                html += '<div class="note-header">';
                html += '<span class="note-code">' + note.code + '</span>';
                html += '<span class="note-name">' + note.name + '</span>';
                html += '<span class="note-status status-' + note.status + '">' + note.status + '</span>';
                html += '</div>';
                html += '</div>';
                html += '<div class="note-summary">' + escapeHtml(note.summary) + '</div>';
                html += '<div class="note-toggle" onclick="toggleContent(\'' + note.code + '\')">顯示全文 ▼</div>';
                html += '<div class="note-content" id="content-' + note.code + '">' + escapeHtml(note.content) + '</div>';
                html += '<div class="note-result" id="result-' + note.code + '"></div>';
                html += '</div>';
            }

            container.innerHTML = html;
        }

        function toggleContent(code) {
            var content = document.getElementById("content-" + code);
            var toggle = content.previousElementSibling;
            if (content.style.display === "none" || content.style.display === "") {
                content.style.display = "block";
                toggle.textContent = "隱藏全文 ▲";
            } else {
                content.style.display = "none";
                toggle.textContent = "顯示全文 ▼";
            }
        }

        function escapeHtml(text) {
            var div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        async function importAll() {
            var adminKey = document.getElementById("adminKey").value;
            var reportDate = document.getElementById("reportDate").value;

            if (!adminKey) {
                alert("請輸入管理員密碼");
                return;
            }

            if (!reportDate) {
                alert("請選擇週報日期");
                return;
            }

            var btn = document.getElementById("importBtn");
            var progress = document.getElementById("progress");
            btn.disabled = true;

            var selected = [];
            for (var i = 0; i < notesData.length; i++) {
                var checkbox = document.getElementById("check-" + notesData[i].code);
                if (checkbox && checkbox.checked) {
                    selected.push(notesData[i]);
                }
            }

            var success = 0;
            var failed = 0;

            for (var j = 0; j < selected.length; j++) {
                var note = selected[j];
                progress.textContent = "匯入中... " + (j + 1) + "/" + selected.length + " (" + note.code + " " + note.name + ")";

                try {
                    var resp = await fetch(WORKER_URL + "/api/stock-notes", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "X-Admin-Key": adminKey
                        },
                        body: JSON.stringify({
                            code: note.code,
                            status: note.status,
                            summary: note.summary,
                            content: note.content,
                            date: reportDate
                        })
                    });

                    var result = await resp.json();
                    var resultEl = document.getElementById("result-" + note.code);

                    if (resp.ok && result.success) {
                        success++;
                        resultEl.className = "note-result result-success";
                        resultEl.textContent = "✓ 匯入成功 (" + result.action + ")";
                    } else {
                        failed++;
                        resultEl.className = "note-result result-error";
                        resultEl.textContent = "✗ 匯入失敗: " + (result.error || "未知錯誤");
                    }
                } catch (e) {
                    failed++;
                    var errEl = document.getElementById("result-" + note.code);
                    errEl.className = "note-result result-error";
                    errEl.textContent = "✗ 匯入失敗: " + e.message;
                }

                await new Promise(function(resolve) { setTimeout(resolve, 300); });
            }

            progress.textContent = "匯入完成！成功: " + success + "，失敗: " + failed;
            btn.disabled = false;
        }

        renderNotes();
    </script>
</body>
</html>
